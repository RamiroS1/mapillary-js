name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v1
        with:
          node-version: "16.x"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Setup
        run: npm run setup

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v1
        with:
          node-version: "16.x"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Setup
        run: npm run setup

      - name: Build MJS for doc
        run: npm run build && (cd doc && ./mapillary-js.sh)

      - name: Install doc dependencies
        run: npm install --prefix doc

      - name: Lint
        run: npm run lint --prefix doc

      - name: Build API reference
        run: npm run build-api --prefix doc

      - name: Build doc website
        run: npm run build --prefix doc
